<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <!-- HTTP -> HTTPS zorla: http'de "Guvenli degil" cikar ve Firebase/Firestore
       duzgun calismaz (katalog senkronu basarisiz -> guncellemeler gorunmez). -->
  <script>
    (function () {
      if (location.protocol === 'http:' &&
          location.hostname !== 'localhost' &&
          location.hostname !== '127.0.0.1') {
        location.replace('https://' + location.host + location.pathname + location.search + location.hash);
      }
    })();
  </script>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="BabyBites — bebeğiniz için ek gıda rehberi, tarifler ve beslenme takibi.">

  <!-- ===== Google AdSense (site dogrulama + reklam servisi) ===== -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4036323836264136" crossorigin="anonymous"></script>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="babybites">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>babybites</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Firebase JS SDK'sini firebase_core_web otomatik enjekte eder (deploy'da
       calisiyor). Elle <script> ile yuklemeyin: gstatic firebase-app.js bir ES
       module'dur, klasik script olarak "Unexpected token export" hatasi verir. -->
  <script src="flutter_bootstrap.js" async></script>

  <!-- Boot yedek ekrani: motor (ozellikle eski iOS Safari / bayat service worker
       / boot JS hatasi) yuklenemezse bos sayfa yerine mesaj + "Yenile" gosterir.
       Yenile, eski service worker + onbellegi temizleyip sayfayi yeniden yukler
       (bayat-cache kaynakli boş sayfalari kendi kendine onarir). -->
  <div id="bb-fallback" style="display:none; position:fixed; inset:0; z-index:99999; background:#FAF9F6; color:#3A3A3A; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; align-items:center; justify-content:center; padding:24px; text-align:center;">
    <div style="max-width:340px;">
      <div style="font-size:40px; margin-bottom:12px;">🍼</div>
      <div style="font-size:18px; font-weight:700; margin-bottom:8px;">Uygulama açılamadı</div>
      <div style="font-size:14px; line-height:1.5; color:#7A7A85; margin-bottom:20px;">
        Bağlantı veya tarayıcı önbelleği kaynaklı olabilir. Lütfen yenileyin.
        Sorun sürerse Safari/tarayıcınızı güncelleyin ya da Chrome ile deneyin.
      </div>
      <button id="bb-reload" style="background:#FF7A45; color:#fff; border:none; border-radius:12px; padding:12px 22px; font-size:15px; font-weight:700;">Yenile</button>
    </div>
  </div>
  <script>
    (function () {
      function booted() {
        return !!document.querySelector('flutter-view, flt-glass-pane, flt-scene-host');
      }
      function clearCachesAndReload() {
        try {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (rs) {
              rs.forEach(function (r) { r.unregister(); });
            }).catch(function () {});
          }
          if (window.caches && caches.keys) {
            caches.keys().then(function (ks) { ks.forEach(function (k) { caches.delete(k); }); }).catch(function () {});
          }
        } catch (e) {}
        setTimeout(function () { location.reload(); }, 500);
      }
      var btn = document.getElementById('bb-reload');
      if (btn) btn.addEventListener('click', clearCachesAndReload);
      // 18 sn icinde uygulama render olmadiysa yedek ekrani goster (yavas
      // baglantida yanlis tetiklenmesin diye esik genis tutuldu; otomatik
      // reload YOK, kullaniciya birakildi -> sonsuz dongu riski olmaz).
      setTimeout(function () {
        if (!booted()) {
          var el = document.getElementById('bb-fallback');
          if (el) el.style.display = 'flex';
        }
      }, 18000);
    })();
  </script>
</body>
</html>
