name: Deploy to Firebase Hosting

# Her main push'ta web'i derleyip Firebase Hosting'e (live kanal) yayınlar.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (release)
        run: flutter build web --web-renderer html --release

      # GitHub runner varsayılan Node'u 24'e geçti; firebase-tools Node 24'te
      # OAuth token alamıyor ("Premature close"). Node 20'yi PATH'e koyarak
      # deploy adımındaki `npx firebase-tools` Node 20 altında çalışsın.
      - name: Node 20 (firebase-tools için)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BABYBITES }}
          channelId: live
          projectId: babybites-prod-8afe0
