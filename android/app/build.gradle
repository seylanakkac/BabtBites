plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
    // Firebase (google-services.json -> otomatik yapılandırma).
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

// Release imza yapılandırması: android/key.properties varsa oradan okunur
// (CI'da gizli anahtarlardan üretilir). Yoksa debug anahtarıyla derlenir,
// böylece yerel `flutter run` ve web tarafı etkilenmez.
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
def hasKeystore = keystorePropertiesFile.exists()
if (hasKeystore) {
    keystorePropertiesFile.withReader("UTF-8") { reader ->
        keystoreProperties.load(reader)
    }
}

android {
    namespace = "tr.com.babybites"
    compileSdk = flutter.compileSdkVersion
    // Bazı eklentiler daha yüksek NDK ister (build uyarısı).
    ndkVersion = "25.1.8937393"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        // Play Store kalıcı kimliği — yayından sonra değiştirilemez.
        applicationId = "tr.com.babybites"
        // Firebase Android SDK (firebase_core 3.x) minSdk 23 ister.
        minSdk = 23
        targetSdk = flutter.targetSdkVersion
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
    }

    signingConfigs {
        if (hasKeystore) {
            release {
                keyAlias = keystoreProperties["keyAlias"]
                keyPassword = keystoreProperties["keyPassword"]
                storeFile = keystoreProperties["storeFile"] ? rootProject.file(keystoreProperties["storeFile"]) : null
                storePassword = keystoreProperties["storePassword"]
                storeType = "PKCS12"
            }
        }
    }

    buildTypes {
        release {
            signingConfig = hasKeystore ? signingConfigs.release : signingConfigs.debug
            minifyEnabled = false
            shrinkResources = false
        }
    }
}

flutter {
    source = "../.."
}
